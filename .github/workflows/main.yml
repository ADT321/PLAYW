name: Playwright Tests
on:
  push:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: self-hosted
    steps:
    - uses: actions/checkout@v4

    - name: Restore Salesforce session
      run: |
        mkdir -Force playwright\.auth
        copy "C:\PlaywrightAuth\user.json" "playwright\.auth\user.json"
      shell: powershell

    - name: Install dependencies
      run: npm ci

    - name: Run Playwright tests
      run: npx playwright test contactTest.spec.ts

    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30